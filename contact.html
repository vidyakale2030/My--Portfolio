<!DOCTYPE html>
<html>
<head>
<title>Conference Contact</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    /* CONTACT PAGE STYLING */

.container{
padding:60px;
text-align:center;
}

/* Form Box */
form{
max-width:450px;
margin:30px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
animation:fade 1s ease-in;
}

/* Input Fields */
input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
outline:none;
transition:0.3s;
}

/* Focus Effect */
input:focus, textarea:focus{
border-color:#ff9800;
box-shadow:0 0 5px rgba(255,152,0,0.5);
}

/* Button */
button{
width:100%;
padding:12px;
background:#19bc34;
border:none;
color:white;
font-size:18px;
border-radius:5px;
cursor:pointer;
transition:0.3s;

}
.submit{
    margin-left: 40%;
padding:12px;
background:#19bc34;
border:none;
color:white;
font-size:18px;
border-radius:5px;
cursor:pointer;
text-decoration: none;
transition:0.3s;


}
.submit:hover{
    background:#e68900;
}
/* Button Hover */
button:hover{
background:#e68900;
}

/* Success Message */
#msg{
margin-top:20px;
font-size:18px;
color:green;
}

/* Heading */
h2,p,h3{
margin-bottom:20px;
text-align: center;
}

/* Optional Contact Info Cards */
.contact-info{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:40px;
}

.info-box{
background:white;
padding:20px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
border-radius:8px;
}

.info-box h3{
color:#ff9800;
margin-bottom:10px;
}

/* Animation */
@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
<body>
<div class="form">
<form>

<label>Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>


<label>Message</label>
<textarea placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>
<br><br>
    

<a href="thankYou.html" class="submit">submit</a>

<p id="msg"></p>
</form>

</div>

</div>

</section>

<footer>
<p>© 2026 Global Tech Conference</p>
</footer>

</body>
</html>
